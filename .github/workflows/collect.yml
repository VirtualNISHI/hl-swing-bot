name: collect

# Hyperliquid BTC perp data collector — Phase 0.
# Runs every 5 minutes, appends candles + perp snapshots into data/market.duckdb
# and commits the updated DB back to the repo. The DB IS the source of truth;
# local clones should pull before running anything against it.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GH Actions may jitter ±a few min)
  workflow_dispatch:        # manual trigger for tests / backfill

permissions:
  contents: write   # required to commit market.duckdb back

concurrency:
  group: hl-db-commit
  cancel-in-progress: false   # let in-flight runs finish; the gap-aware collector handles overlap

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: Collect once
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONIOENCODING: utf-8
        run: python -m hl_swing_bot.collector --once

      - name: Commit updated DuckDB
        if: always()   # even if the collect step had a transient HL error, persist whatever landed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/market.duckdb ] && [ -n "$(git status --porcelain data/market.duckdb)" ]; then
            # Copy-aside commit: binary files can't rebase, so on any race we
            # re-commit our DB on top of the freshest origin/main (last-writer-
            # wins is self-healing here — every collector is incremental and
            # re-fetches anything the other run's snapshot lacked).
            cp data/market.duckdb /tmp/market.duckdb
            for attempt in 1 2 3; do
              git fetch origin && git reset --hard origin/main
              cp /tmp/market.duckdb data/market.duckdb
              git add data/market.duckdb
              git commit -m "chore: collector data update [skip ci]"
              git push && break
              echo "push race (attempt $attempt), retrying"
            done
          else
            echo "no DB change — nothing to commit."
          fi
