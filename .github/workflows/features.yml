name: features

# Phase 1.5 feature ingestion. Pulls sibling-project features (currently the
# Liquidation_cascade bias score) into the DuckDB feature store, forward-only.
# Reads the upstream bias_log.jsonl via raw.githubusercontent (cross-repo).
#
# Runs every 2h: the upstream Liquidation_cascade posts on 4-hourly slots, so
# every-2h guarantees we pick up each new observation within a couple hours.
# The adapter is idempotent (forward-only), so extra runs are cheap no-ops.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hl-features
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Ingest sibling features
        run: python -m hl_swing_bot.adapters.runner

      - name: Commit feature store updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/market.duckdb ] && [ -n "$(git status --porcelain data/market.duckdb)" ]; then
            git add data/market.duckdb
            git commit -m "chore: feature ingestion [skip ci]"
            git push || (git pull --rebase --autostash && git push)
          else
            echo "no feature change."
          fi
